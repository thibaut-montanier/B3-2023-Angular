<p>tennis-players-list works!</p>
<app-tennis-players-list [players]="getPlayers()"
        (selectionChanged)="selectionChanged($event)"
        [disabled]="canValidate()"
        [selection]="selection"></app-tennis-players-list>

<button type="button" (click)="onCreate()"  [disabled]="canValidate()">Créer</button>

<app-tennis-player-form [selection]="selection"
   (dirtyChanged)="onDirtyChanged($event)"></app-tennis-player-form>
